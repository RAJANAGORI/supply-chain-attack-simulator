name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'documentation/**'
      - 'LEGAL.md'
      - 'ATTRIBUTION.md'
      - 'AUTHORS.md'
      - 'DOCUMENTATION-CC-BY-NC-ND.md'
      - 'scripts/materialize-docs-for-pages.sh'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Materialize documentation for static hosting
        run: chmod +x scripts/materialize-docs-for-pages.sh && SCAS_MATERIALIZE_DOCS=1 ./scripts/materialize-docs-for-pages.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
