<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Supply Chain Attack Simulator</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to the Supply Chain Attack Simulator homepage.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <script>
    (function () {
      var path = window.location.pathname.replace(/\/$/, '');
      var prefix = path.indexOf('/supply-chain-attack-simulator') === 0 ? '/supply-chain-attack-simulator/' : '/';
      var rel = path.replace(/^\/supply-chain-attack-simulator\//, '').replace(/^\//, '');
      if (rel.endsWith('.md')) {
        var target = prefix + 'guide.html?p=' + encodeURIComponent(rel) + window.location.hash;
        window.location.replace(target);
        return;
      }
      window.__scas404Base = prefix;
    })();
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#e8e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;overflow:hidden}
    .bg-grid{position:fixed;inset:0;z-index:-1;background-image:linear-gradient(rgba(99,102,241,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.03) 1px,transparent 1px);background-size:64px 64px}
    .error-code{font-family:'JetBrains Mono',monospace;font-size:clamp(6rem,20vw,12rem);font-weight:800;background:linear-gradient(135deg,#6366f1 0%,#a855f7 50%,#06b6d4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:16px}
    h1{font-size:1.5rem;font-weight:600;margin-bottom:12px}
    p{color:#9d9daf;font-size:1rem;margin-bottom:32px;max-width:400px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;font-size:.95rem;font-weight:600;border-radius:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;text-decoration:none;transition:all .25s cubic-bezier(.4,0,.2,1);box-shadow:0 4px 16px rgba(99,102,241,.3)}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.4)}
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <main>
    <div class="error-code" aria-hidden="true">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Head back to the Supply Chain Attack Simulator homepage.</p>
    <a href="/" id="scas-home-link" class="btn">
      Back to Home
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10m0 0L9 4m4 4L9 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </main>
  <script>
    (function () {
      var base = window.__scas404Base || '/';
      var link = document.getElementById('scas-home-link');
      if (link) link.setAttribute('href', base);
    })();
  </script>
</body>
</html>
